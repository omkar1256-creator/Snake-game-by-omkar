<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classic Snake Game</title>
    <style>
        body {
            background-color: #222;
            color: white;
            font-family: 'Arial', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        #score-board {
            font-size: 1.5rem;
            margin-bottom: 20px;
            background: #333;
            padding: 10px 20px;
            border-radius: 5px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        #game-board {
            width: 400px;
            height: 400px;
            background-color: #111;
            position: relative;
            border: 4px solid #4CAF50;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(76, 175, 80, 0.5);
        }

        .snake {
            background-color: #4CAF50;
            position: absolute;
            box-sizing: border-box;
            border: 1px solid #222;
            border-radius: 4px;
        }

        .snake-head {
            background-color: #8BC34A;
        }

        .food {
            background-color: #FF5722;
            position: absolute;
            border-radius: 50%;
            box-shadow: 0 0 8px #FF5722;
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 6px;
        }

        #game-over-screen h2 {
            color: #FF5722;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        #restart-btn {
            background-color: #4CAF50;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 5px;
            transition: 0.2s;
        }

        #restart-btn:hover {
            background-color: #45a049;
            transform: scale(1.05);
        }
    </style>
</head>
<body>

    <h1>Snake Game</h1>
    <div id="score-board">Score: <span id="score">0</span></div>

    <div id="game-board">
        <div id="game-over-screen">
            <h2>Game Over</h2>
            <button id="restart-btn" onclick="resetGame()">Play Again</button>
        </div>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over-screen');

        const gridSize = 20; // 20x20 grid (400px / 20px)
        const tileSize = 20;
        
        let snake = [{x: 10, y: 10}];
        let food = {x: 5, y: 5};
        let dx = 1; // Horizontal speed/direction
        let dy = 0; // Vertical speed/direction
        let score = 0;
        let gameInterval;
        let gameSpeed = 100; // Milliseconds per frame

        // Game ko start karne ke liye
        function startGame() {
            createFood();
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        // Main game loop jo har 100ms me chalega
        function gameLoop() {
            if (checkGameOver()) {
                clearInterval(gameInterval);
                gameOverScreen.style.display = 'flex';
                return;
            }

            moveSnake();
            checkFoodCollision();
            drawGrid();
        }

        // Saanp ko aage badhane ke liye
        function moveSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head); // Naya sar aage jodo
            snake.pop(); // Puraani poonch hatao (agar khana nahi khaya)
        }

        // Board ko refresh aur draw karne ke liye
        function drawGrid() {
            // Sirf snake aur food ke elements ko clear karo (baaki screens ko nahi)
            const elementsToRemove = document.querySelectorAll('.snake, .food');
            elementsToRemove.forEach(el => el.remove());

            // Snake draw karo
            snake.forEach((part, index) => {
                const snakeElement = document.createElement('div');
                snakeElement.style.left = `${part.x * tileSize}px`;
                snakeElement.style.top = `${part.y * tileSize}px`;
                snakeElement.style.width = `${tileSize}px`;
                snakeElement.style.height = `${tileSize}px`;
                snakeElement.classList.add('snake');
                if (index === 0) snakeElement.classList.add('snake-head'); // Head alag color ka hoga
                board.appendChild(snakeElement);
            });

            // Food draw karo
            const foodElement = document.createElement('div');
            foodElement.style.left = `${food.x * tileSize}px`;
            foodElement.style.top = `${food.y * tileSize}px`;
            foodElement.style.width = `${tileSize}px`;
            foodElement.style.height = `${tileSize}px`;
            foodElement.classList.add('food');
            board.appendChild(foodElement);
        }

        // Random jagah par khana paida karne ke liye
        function createFood() {
            food.x = Math.floor(Math.random() * gridSize);
            food.y = Math.floor(Math.random() * gridSize);

            // Check ki khana snake ke upar na paida ho jaye
            snake.forEach(part => {
                if (part.x === food.x && part.y === food.y) {
                    createFood();
                }
            });
        }

        // Check karo ki snake ne khana khaya ya nahi
        function checkFoodCollision() {
            if (snake[0].x === food.x && snake[0].y === food.y) {
                score += 10;
                scoreElement.innerText = score;
                createFood();
                
                // Snake ki lambai badhane ke liye pichla hissa wapas add karo
                const tail = { ...snake[snake.length - 1] };
                snake.push(tail);
            }
        }

        // Game over conditions (Deewar ya khud se takrana)
        function checkGameOver() {
            const head = snake[0];
            
            // Deewar se takrana
            if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
                return true;
            }

            // Khud ke sharir se takrana
            for (let i = 1; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        // Keyboard inputs ko handle karne ke liye (Arrow Keys)
        window.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowUp':
                    if (dy !== 1) { dx = 0; dy = -1; } // Upar jao par tabhi jab niche na ja rahe ho
                    break;
                case 'ArrowDown':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
            }
        });

        // Game restart karne ke liye
        function resetGame() {
            snake = [{x: 10, y: 10}];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            gameOverScreen.style.display = 'none';
            createFood();
            clearInterval(gameInterval);
            gameInterval = setInterval(gameLoop, gameSpeed);
        }

        // Pehli baar game start karne ke liye
        startGame();
    </script>
</body>
</html>
